
<!-- #####----- HTML Formatting -------------------------------------------------------------------------------------------------------------##### -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    
    <h1>Heading</h1>
    <p><b>	Defines bold text</b></p>
    <p><em>	Defines emphasized text </em></p>
    <p><i>	Defines a part of text in an alternate voice or mood</i></p>
    <p><small>	Defines smaller text</small></p>
    <p><strong>	Defines important text</strong></p>
    <p>Defines <sub>subscripted text</sub></p>
    <p>Defines <sup>superscripted text</sup></p>
    <p>Defines <ins>inserted text</ins></p>
    <p><del>	Defines deleted text</del></p>
    <p><mark>	Defines marked/highlighted text</mark></p>


</body>
</html>
